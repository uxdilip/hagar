<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StringTune : Tutorial : Reveal on scroll</title>
  <script src="https://unpkg.com/@fiddle-digital/string-tune@1.1.55/dist/index.js"></script>
  <style>
@property --progress {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-angle {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-distance {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  --vh: 1vh;
  --vw: 1vw;
  --c-white: #ffffff;
  --c-black: #000000;
  --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333;
  --c-grey-dark-rgba: 51, 51, 51;
  --c-grey: #999999;
  --c-red: #FF5A37;

  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --easing-timing: 1.5s;

  --g-gap: 0.4rem;
  --g-margin: calc(var(--g-gap) * 2);

  --mm: 0.64rem;
  --m: 0.8rem;
  --p: 1rem;
  --h6: 1.25rem;
  --h5: 1.563rem;
  --h4: 1.953rem;
  --h3: 2.441rem;
  --h2: 3.052rem;
  --h1: 3.815rem;
  --h0: 5.065rem;
  --large: max(6.331rem, 18vw);
  
}
@media (min-width: 1024px) {
  :root {
    --g-margin: calc(var(--g-gap) * 4);
  }
}

html,
body,
* {
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  line-height: 1.25;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #808080;
  color: black;
}
.-w {
  margin-left: var(--g-margin);
  margin-right: var(--g-margin);
}
@media (min-width: 1024px) {
  html {
    font-size: 20px;
  }
}
body {
  position: relative;
  min-height: 100lvh;
}
.note {
  color: var(--c-white);
}
svg {
  display: block;
}
img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
button {
  border: none;
  margin: 0;
  padding: 0;
  position: relative;
  background-color: transparent;
  cursor: pointer;
  display: block;
  touch-action: manipulation;
  color: var(--c-white);
}

h1,
h2,
h3,
h3,
h4,
h5,
h6 {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: normal;
}
.-lrg {
  font-size: var(--large);
}
.-h0 {
  font-size: var(--h0);
}
h1, .-h1 {
  font-size: var(--h1);
}
h2, .-h2 {
  font-size: var(--h2);
}
h3, .-h3 {
  font-size: var(--h3);
}
h4, .-h4 {
  font-size: var(--h4);
}
h5, .-h5 {
  font-size: var(--h5);
}
h6, .-h6 {
  font-size: var(--h6);
}
.-p {
  font-size: var(--p);
}
.-m {
  font-size: var(--m);
}
.-mm {
  font-size: var(--mm);
}
@media (max-width: 1600px) {
  .-mid-lrg {
    font-size: var(--large);
  }
  .-mid-h0 {
    font-size: var(--h0);
  }
  .-mid-h1 {
    font-size: var(--h1);
  }
  .-mid-h2 {
    font-size: var(--h2);
  }
  .-mid-h3 {
    font-size: var(--h3);
  }
  .-mid-h4 {
    font-size: var(--h4);
  }
  .-mid-h5 {
    font-size: var(--h5);
  }
  .-mid-h6 {
    font-size: var(--h6);
  }
  .-mid-p {
    font-size: var(--p);
  }
  .-mid-m {
    font-size: var(--m);
  }
  .-mid-mm {
    font-size: var(--mm);
  }
}

@media (max-width: 1024px) {
  .-m-lrg {
    font-size: var(--large);
  }
  .-m-h0 {
    font-size: var(--h0);
  }
  .-m-h1 {
    font-size: var(--h1);
  }
  .-m-h2 {
    font-size: var(--h2);
  }
  .-m-h3 {
    font-size: var(--h3);
  }
  .-m-h4 {
    font-size: var(--h4);
  }
  .-m-h5 {
    font-size: var(--h5);
  }
  .-m-h6 {
    font-size: var(--h6);
  }
  .-m-p {
    font-size: var(--p);
  }
  .-m-m {
    font-size: var(--m);
  }
  .-m-mm {
    font-size: var(--mm);
  }
}

.-up {
  text-transform: uppercase;
}
.-tac {
  text-align: center;
}

.-splitted {
  display: flex;
  flex-wrap: wrap;
}
.-s-line {
  display: flex;
  width: 100%;
  will-change: contents;
}
.-s-word {
  display: inline-flex;
  will-change: contents;
}
.-s-char {
  display: inline-flex;
  will-change: contents;
}

.-w {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  align-items: start;
  column-gap: var(--g-gap);
  padding-bottom: var(--h0);
}
.-w div {
  grid-column-start: 1;
  grid-column-end: 15;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  height: calc(var(--vh, 1vh) * 80);
}
.-w span {
  margin-top: calc(var(--vh, 1vh) * 10);
}
.-w figure {
  overflow: hidden;
  box-shadow: inset 0 0 0 1px var(--c-grey-dark);
}
.-w figure img {
  scale: 2;
  opacity: 0;
  clip-path: polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%);
}
.-w figure.-inview {}
.-w figure.-inview img {
  scale: 1;
  opacity: 1;
  clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
  transition:
    scale var(--easing-timing) var(--easing-function),
    opacity var(--easing-timing) var(--easing-function),
    clip-path var(--easing-timing) var(--easing-function)
  ;
}
.-w .image-1 {
  grid-row-start: 2;
  grid-column-start: 2;
  grid-column-end: 7;
}
.-w .image-2 {
  grid-row-start: 2;
  grid-column-start: 10;
  grid-column-end: 13;
}
.-w .image-3 {
  grid-row-start: 3;
  grid-row-end: 4;
  grid-column-start: 4;
  grid-column-end: 8;
}
.-w .image-4 {
  grid-row-start: 4;
  grid-row-end: 5;
  grid-column-start: 10;
  grid-column-end: 14;
}
.-w .image-5 {
  grid-row-start: 6;
  grid-column-start: 2;
  grid-column-end: 5;
}
.-w .image-6 {
  grid-row-start: 6;
  grid-column-start: 7;
  grid-column-end: 11;
  align-self: end;
}
</style>
</head>

<body>
  <div class="-w">
  <div>
    <span class="-mm -up">Scroll to reveal</span>
  </div>
  <figure class="image-1" string string-repeat>
    <img string="lazy" string-lazy="https://picsum.photos/755/414" alt="StringTune">
  </figure>
  <figure class="image-2" string string-repeat>
    <img string="lazy" string-lazy="https://picsum.photos/687/453" alt="StringTune">
  </figure>
  <figure class="image-3" string string-repeat>
    <img string="lazy" string-lazy="https://picsum.photos/488/597" alt="StringTune">
  </figure>
  <figure class="image-4" string string-repeat>
    <img string="lazy" string-lazy="https://picsum.photos/633/510" alt="StringTune">
  </figure>
  <figure class="image-5" string string-repeat>
    <img string="lazy" string-lazy="https://picsum.photos/771/447" alt="StringTune">
  </figure>
  <figure class="image-6" string string-repeat>
    <img string="lazy" string-lazy="https://picsum.photos/547/468" alt="StringTune">
  </figure>
</div>

  <script>
    const stringTune = StringTune.StringTune.getInstance();
    window.StringTuneContext = stringTune;
      stringTune.use(StringTune.StringLazy);

    stringTune.start(0);
  </script>
  
</body>
